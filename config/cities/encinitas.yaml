# Encinitas, CA — City Configuration
# Coastal San Diego County city with canyon terrain and Santa Ana wind exposure.
# Eastern inland portions (Olivenhain community) are mapped VHFHSZ by CAL FIRE.

city_name: "Encinitas"
state: "CA"
state_fips: "06"
county_fips: "073"  # San Diego County
place_fips: "22678"  # Encinitas city FIPS

# OSMnx place query string
osmnx_place: "Encinitas, California, USA"

# Census TIGER city boundary URL
# (California statewide places shapefile — same file used for all CA cities)
tiger_url: "https://www2.census.gov/geo/tiger/TIGER2023/PLACE/tl_2023_06_place.zip"

# Coordinate Reference System
crs: "EPSG:4326"           # WGS84 for storage
analysis_crs: "EPSG:26911"  # UTM Zone 11N for distance calculations (San Diego County)

# FHSZ local file override
# The HHZ_ref_FHSZ CAL FIRE API only returns SRA zones. Encinitas is LRA (Local
# Responsibility Area); the city adopted CAL FIRE maps in 2025. The API returns
# 0 features for Encinitas. Place the locally-adopted FHSZ GeoJSON at the path
# below (see config/cities/fhsz/README.md for how to obtain it).
# Approximate zone coverage from 2025 adoption:
#   ~18% VHFHSZ — Olivenhain, Saxony Canyon, South El Camino Real / Crest Drive
#   ~9%  High    — transitional inland hillsides
#   ~9%  Moderate — lower canyon edges
fhsz_local_file: "config/cities/fhsz/encinitas_fhsz.geojson"

# Fallback API for auto-provisioning fhsz_local_file when the file is absent.
# San Diego County OES public FeatureServer — SRA FHSZ effective April 1, 2024,
# clipped to San Diego County (includes Encinitas LRA zones).
# Used by _auto_provision_fhsz_local_file() in data_acquisition.py.
fhsz_fallback_api: "https://gis-public.sandiegocounty.gov/arcgis/rest/services/hosted/OES_KnowYourHazards_Wildfire_1/FeatureServer/0"

# City-specific parameter overrides (leave empty to use parameters.yaml defaults).
# v3.2: Mobilization is constant 0.90 (NFPA 101 design basis) — not tiered by zone.
# Encinitas ACS B25044 vehicle ownership is above the 2.5 vpu default (affluent coastal suburb).
# Update vehicles_per_unit below if a city-commissioned ACS pull confirms a different rate.
overrides: {}
# Example overrides:
#   vehicles_per_unit: 2.7  # if city-specific ACS B25044 exceeds 2.5 default

# Safe egress window overrides
# Encinitas canyon terrain + Santa Ana wind exposure can accelerate fire spread
# beyond the NIST Camp Fire (Butte County) baseline. Consider reducing vhfhsz window
# if city Fire Dept. or CalFire provides a local fire behavior study.
# Uncomment and adjust only with a supporting technical study.
# safe_egress_window:
#   vhfhsz: 30        # Santa Ana canyon scenario (faster spread than Camp Fire baseline)
#   high_fhsz: 60
#   moderate_fhsz: 90
#   non_fhsz: 120

# ============================================================
# Employment and Commute Parameters
# Source: U.S. Census ACS 2022, Encinitas CDP / city estimates
# ============================================================

# Fraction of working-age population (16+) that is employed
# Source: ACS 2022, Encinitas — comparable to San Diego County average
employment_rate: 0.63

# Fraction of Encinitas jobs filled by workers commuting in from outside city
# Encinitas is primarily residential; most workers commute out via I-5 or NCTD Coaster.
# Source: Census LEHD OnTheMap, 2021 — San Diego County inflow/outflow
commute_in_fraction: 0.30

# No major universities in Encinitas (MiraCosta College is in Oceanside / Vista).
universities: []

# Key evacuation routes for validation
# Encinitas has limited east-west egress from inland canyons.
# El Camino Real and Encinitas Blvd are primary inland corridors.
# Highway 101 serves coastal neighborhoods northbound.
known_evacuation_routes:
  - "El Camino Real"
  - "Encinitas Blvd"
  - "Leucadia Blvd"
  - "La Costa Ave"
  - "Olivenhain Rd"
  - "Rancho Santa Fe Rd"
  - "S Coast Hwy 101"

# Notes
notes: >
  Encinitas is entirely LRA (Local Responsibility Area). The HHZ_ref_FHSZ
  CAL FIRE API returns 0 features for this city because it only serves SRA zones.
  The city adopted CAL FIRE FHSZ maps in 2025; locally-adopted zone coverage is
  approximately: ~18% VHFHSZ (Olivenhain, Saxony Canyon, South El Camino/Crest
  Drive), ~9% High (transitional inland hillsides), ~9% Moderate (lower canyon
  edges). See fhsz_local_file above and config/cities/fhsz/README.md.
  Projects in VHFHSZ areas face road capacity degradation (factor 0.35 per HCM)
  and a tight ΔT threshold (45 min × 5% = 2.25 min). Projects in non-FHSZ coastal
  areas evaluate at the standard 6.0-min threshold with no capacity degradation.
  Clark Ave dead-end access (coastal bluffs) illustrates the pending Standard 6
  (IFC §503 site access) problem: large projects at end of substandard-width
  single-access roads are not fully captured by ΔT alone.
  v3.2: Mobilization is constant 0.90 (NFPA 101). FHSZ affects road capacity only.
