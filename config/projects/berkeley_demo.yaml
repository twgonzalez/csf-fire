# ============================================================
# Berkeley AB 747 Demo Projects — JOSH v3.1 (ΔT Standard)
# ============================================================
# Use with:  uv run python main.py demo --city "Berkeley"
#
# Purpose: Demonstrate ministerial vs discretionary determination
# to city planners.  Each project appears as a toggleable layer
# on the output map so reviewers can compare impacts side-by-side.
#
# Tier logic (v3.1 — ΔT Standard with derived thresholds):
#   DISCRETIONARY           — size >= 15 AND ΔT > threshold on any serving route
#                             (threshold = safe_egress_window[zone] × max_project_share)
#                             (no baseline precondition — routes already failing are tested equally)
#   CONDITIONAL MINISTERIAL — size >= 15 AND ΔT within threshold on all serving routes
#   MINISTERIAL             — size < 15
#
# v3.1 derived thresholds (safe_egress_window × 5%):
#   vhfhsz:        45 min × 5% = 2.25 min
#   high_fhsz:     90 min × 5% = 4.50 min
#   moderate_fhsz: 120 min × 5% = 6.00 min
#   non_fhsz:      120 min × 5% = 6.00 min
#
# Core metric: ΔT = (project_vehicles / bottleneck_effective_capacity) × 60 + egress_penalty
#   project_vehicles = units × 2.5 vpu × mobilization_rate(hazard_zone)
#   effective_capacity = hcm_capacity × hazard_degradation_factor(fhsz_zone)
#   egress_penalty = 0 for < 4 stories; min(stories × 1.5, 12) for ≥ 4 stories
#
# Coverage matrix (one project per distinct legal concept):
#   Size gate below threshold, no FHSZ → Project 1 (10 units, flat)
#   Size gate below threshold, IN FHSZ → Project 4 (10 units, hills Zone 3)
#   Size met, ΔT within threshold, no FHSZ, 3-story → Project 2 (Downtown, arterials have headroom)
#   Size met, ΔT exceeds threshold, IN FHSZ Zone 3 → Project 3 (Hills Gateway, high mob + degraded cap)
#   Size met, ΔT within threshold, borderline non-FHSZ → Project 5 (Claremont Hills, 0.25 mob)
#   Size met, egress penalty pushes ΔT over threshold → Project 6 (Cedar Street, 6-story)
# ============================================================

city: "Berkeley"
state: "CA"
description: "Berkeley AB 747 — Ministerial vs Discretionary Demo (v3.1 ΔT Standard)"

projects:

  # -----------------------------------------------------------
  # 1 — Small infill: below the 15-unit threshold → MINISTERIAL
  # -----------------------------------------------------------
  - name: "Ashby Small Infill"
    address: "Ashby BART Station Area"
    lat: 37.8528
    lon: -122.2699
    units: 10
    stories: 2
    description: >
      10-unit project at Ashby BART — below the 15-unit size threshold.
      Standard 1 (size gate) is not triggered, so the project qualifies for ministerial
      approval regardless of evacuation route congestion or ΔT computation.
    expected_tier: "MINISTERIAL"

  # -----------------------------------------------------------
  # 2 — Mid-rise downtown: at threshold, high-capacity arterials → CONDITIONAL
  #     3 stories → no egress penalty (below 4-story NFPA 101 threshold).
  #     v3.1: non-FHSZ threshold = 120 min × 5% = 6.0 min.
  #     Vehicle ΔT on Shattuck arterial ≈ 1.5 min (well under 6.0 min).
  # -----------------------------------------------------------
  - name: "Downtown Mid-Rise"
    address: "Shattuck Ave & Center St, Downtown Berkeley"
    lat: 37.8695
    lon: -122.2685
    units: 75
    stories: 3
    description: >
      75-unit, 3-story project on Shattuck Ave. Exceeds the 15-unit threshold.
      Non-FHSZ location → mobilization rate 0.25 (Zhao et al. 2022) → 46.9 project vehicles.
      High-capacity arterials (Shattuck, University) with no hazard degradation.
      No egress penalty (3 stories < 4-story NFPA 101 threshold).
      v3.1 threshold: 120 min safe egress × 5% = 6.0 min. ΔT well below threshold.
      CONDITIONAL MINISTERIAL (evacuation conditions required, but ministerial).
    expected_tier: "CONDITIONAL MINISTERIAL"

  # -----------------------------------------------------------
  # 3 — Hills gateway: in FHSZ Zone 3 → elevated mob rate → DISCRETIONARY
  # -----------------------------------------------------------
  - name: "Hills Gateway"
    address: "Claremont Ave & Tunnel Rd"
    lat: 37.8914
    lon: -122.2494
    units: 80
    stories: 3
    description: >
      80-unit project near the Berkeley Hills in FHSZ Zone 3. Mobilization rate 0.75
      (VHFHSZ per Zhao et al. 2022). Road capacity degraded by factor 0.35 (VHFHSZ).
      Narrow canyon roads at effective capacity well below HCM raw value.
      ΔT exceeds v3.1 VHFHSZ threshold (45 min × 5% = 2.25 min) → DISCRETIONARY.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # 4 — Small hills infill IN FHSZ: size gate overrides fire zone → MINISTERIAL
  #     Same location as Project 3 (Hills Gateway, 80 units → DISCRETIONARY).
  #     Paired comparison proves FHSZ location alone cannot trigger discretionary.
  # -----------------------------------------------------------
  - name: "Hills FHSZ Small Infill"
    address: "Tunnel Rd & Claremont Ave, Berkeley Hills (FHSZ Zone 3 area)"
    lat: 37.8914
    lon: -122.2494
    units: 10
    stories: 2
    description: >
      10-unit project in the Berkeley Hills FHSZ Zone 3 area — same location
      as Hills Gateway (Project 3, 80 units → DISCRETIONARY).
      Despite the fire zone and high mobilization rate, Standard 1 (size gate) is NOT
      triggered: 10 < 15. Returns MINISTERIAL. FHSZ designation is a modifier, not a gate.
    expected_tier: "MINISTERIAL"

  # -----------------------------------------------------------
  # 5 — Claremont Hills: NOT in FHSZ, hillside road, within ΔT threshold → CONDITIONAL
  #     Shows that low mob rate (non-FHSZ = 0.25) generates few project vehicles.
  #     47 vph / ~900 vph bottleneck × 60 = ~3.1 min — well below 10-min non-FHSZ threshold.
  # -----------------------------------------------------------
  - name: "Claremont Hills Terrace"
    address: "Ridge Road & Claremont Ave, Berkeley Hills"
    lat: 37.876
    lon: -122.260
    units: 75
    stories: 3
    description: >
      75-unit hillside project NOT in a mapped FHSZ zone. Non-FHSZ mobilization rate
      (0.25 per Zhao et al. 2022) generates only 46.9 project vehicles. No capacity
      degradation factor applies. Ridge Road bottleneck (~900 vph) yields ΔT ≈ 3.1 min
      — well below the v3.1 non-FHSZ threshold (120 min × 5% = 6.0 min). CONDITIONAL
      MINISTERIAL: size threshold met, evacuation conditions required, but ΔT within bounds.
    expected_tier: "CONDITIONAL MINISTERIAL"

  # -----------------------------------------------------------
  # 6 — Cedar Street: multi-story egress penalty triggers ΔT → DISCRETIONARY
  #     6-story building: egress_penalty = 6 × 1.5 = 9.0 min (above 4-story threshold)
  #     Vehicle ΔT ≈ 2.5 min + 9.0 min egress = 11.5 min > 10-min threshold → DISCRETIONARY
  # -----------------------------------------------------------
  - name: "Cedar Street Infill"
    address: "Cedar Street & Shattuck Ave, North Berkeley"
    lat: 37.879
    lon: -122.278
    units: 75
    stories: 6
    description: >
      75-unit, 6-story project in North Berkeley (NOT in FHSZ). Non-FHSZ mob = 0.25.
      Building egress penalty: 6 stories × 1.5 min/story = 9.0 min (NFPA 101).
      Cedar Street bottleneck (two-lane, ~1125 vph): vehicle ΔT ≈ 2.5 min + 9.0 min egress
      = 11.5 min > 6.0-minute non-FHSZ threshold (120 min × 5%, v3.1). DISCRETIONARY via
      egress + road bottleneck. Mitigation: reduce stories to ≤3 (no egress penalty applies).
    expected_tier: "DISCRETIONARY"
