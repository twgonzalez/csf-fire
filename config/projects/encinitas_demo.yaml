# ============================================================
# Encinitas AB 747 Demo Projects — JOSH v3.4 (ΔT Standard)
# ============================================================
# Use with:  uv run python main.py demo --city "Encinitas"
#
# Purpose: Real-project analysis for three active Encinitas housing proposals.
# All three are pending or in litigation as of March 2026.
#
# FHSZ NOTE: Encinitas is LRA (Local Responsibility Area). The CAL FIRE
# HHZ_ref_FHSZ API returns 0 features (SRA-only endpoint). The city adopted
# CAL FIRE maps in 2025. Locally-adopted zone coverage (approximate):
#   ~18% VHFHSZ — Olivenhain, Saxony Canyon, South El Camino Real / Crest Drive
#   ~9%  High   — transitional inland hillsides
#   ~9%  Moderate — lower canyon edges
#   ~64% Non-FHSZ — coastal strip, downtown, Leucadia, Cardiff
# To use local FHSZ: place config/cities/fhsz/encinitas_fhsz.geojson
# (see config/cities/fhsz/README.md for acquisition instructions).
#
# Tier logic (v3.4 — ΔT Standard, constant mobilization):
#   DISCRETIONARY                        — size >= 15 AND ΔT > threshold on any route
#   MINISTERIAL WITH STANDARD CONDITIONS — size >= 15 AND ΔT within threshold on all routes
#   MINISTERIAL                          — size < 15
#
# Core metric: ΔT = (project_vehicles / bottleneck_effective_capacity) × 60 + egress_penalty
#   project_vehicles = units × 2.5 vpu × 0.90       (NFPA 101 constant mobilization)
#   effective_capacity = hcm_capacity × degradation  (FHSZ zone sets degradation factor)
#   egress_penalty = 0 for < 4 stories; min(stories × 1.5, 12) for ≥ 4 stories
#
# ΔT thresholds by zone:
#   non_fhsz / moderate:  120 min × 5% = 6.00 min
#   high_fhsz:             90 min × 5% = 4.50 min
#   vhfhsz:                45 min × 5% = 2.25 min
#
# Road capacity degradation factors (v3.4, HCM + NIST Camp Fire):
#   non_fhsz:    1.00  (no degradation)
#   moderate:    0.75
#   high_fhsz:   0.50
#   vhfhsz:      0.35
#
# Projects:
#   Non-FHSZ, dead-end, IFC §503 issue     → Clark Avenue Apartments (199 units) [city lawsuit]      DISCRETIONARY
#   VHFHSZ, 5-story egress + degraded cap  → Sage Canyon Apartments (120 units) [PC Dec 2025]        DISCRETIONARY
#   Non-FHSZ, massive scale, 2-lane road   → Quail Meadows Apartments (448 units) [CC Feb 2025]      DISCRETIONARY
#   VHFHSZ Olivenhain, 11-hr evac study    → Goodson Project / Encinitas Blvd Apts (250 units) [under construction]  DISCRETIONARY
#   Non-FHSZ site, VHFHSZ bottleneck       → El Camino Real Corridor — Max Ministerial (29 units)    MINISTERIAL WITH STANDARD CONDITIONS
# ============================================================

city: "Encinitas"
state: "CA"
description: "Encinitas AB 747 — Real Project Analysis (v3.4 ΔT Standard)"

projects:

  # -----------------------------------------------------------
  # Clark Avenue Apartments (real project): 199 units across 15 buildings on a narrow
  #     dead-end street in Leucadia → DISCRETIONARY
  #     Real project: Western National Properties, approved Sept 14 2022 (4-0 City Council),
  #     city sued developer Nov 2025 alleging IFC §503 fire apparatus access violations.
  #     199 units × 2.5 × 0.90 = 447.75 project vehicles.
  #     3 stories → egress_penalty = 0 (< 4-story threshold).
  #     Clark Ave width: 19–21 ft; Union St: 19 ft 6 in — below IFC §503 20-ft one-way
  #     / 26-ft two-way minimums. Single access; no compliant turnaround.
  #     Two-lane dead-end at ≤20 mph: HCM capacity ~900 vph.
  #     ΔT = (447.75 / 900) × 60 ≈ 29.8 min >> 6.0-min non-FHSZ threshold.
  #     Hand-placed 2026-03-15: 33.058122, -117.289088 (east of I-5, project driveway entrance).
  #     Census geocoder matched wrong block of Union St (returns west-of-I-5 segment).
  #     Ingress/egress: 599 Union St (primary, two-way); Clark Ave (egress only).
  #     NOTE: PENDING Standard 6 (IFC §503 site access) would flag this independently
  #     of ΔT — the road widths alone are non-compliant. Standard 6 not yet implemented.
  # -----------------------------------------------------------
  - name: "Clark Avenue Apartments"
    address: "599 Union St (ingress/egress) / Clark Ave (egress only), Leucadia"
    geocode_address: "599 Union St, Encinitas"
    lat: 33.058122   # hand-placed 2026-03-15 — Census geocoder matched wrong block (west of I-5)
    lon: -117.289088
    units: 199
    stories: 3
    additional_egress:
      # Clark Ave egress-only exit — one-way outbound per City Council COA.
      # Road width: 19–21 ft (below IFC §503 26-ft two-way / 20-ft one-way minimum).
      # Coordinates hand-placed 2026-03-15 at Clark Ave site exit driveway.
      # Auto-snap falls to I-5 motorway (nearest OSM node at 166m) — wrong.
      # additional_egress_node_id pins to OSM node 3643380325 (Clark Avenue,
      # 33.063382, -117.289611) — nearest routable Clark Ave node (332m).
      - lat: 33.060400   # hand-placed 2026-03-15 — Clark Ave site exit driveway
        lon: -117.289960
        additional_egress_node_id: 3643380325  # Clark Avenue node, 33.063382, -117.289611
        label: "Clark Ave (egress only)"
        note: "One-way outbound per COA; 19–21 ft width — below IFC §503 minimum"
    description: >
      Real project — Western National Properties, 199-unit / 15-building rental complex
      at 662–682 Clark Ave and 556 Union St in Leucadia (non-FHSZ).
      Access: 599 Union St is the primary ingress/egress (two-way); Clark Ave provides
      egress only. Approved by City Council September 14, 2022 (4–0, overturning Planning
      Commission denial). As of November 2025 the city filed suit in Vista Superior Court
      alleging IFC §503 fire apparatus access violations: Clark Ave is 19–21 ft wide;
      Union St is 19 ft 6 in — both below the IFC §503 minimum (20 ft one-way / 26 ft
      two-way). No compliant fire apparatus turnaround exists on site.
      JOSH ΔT analysis: 199 × 2.5 × 0.90 = 447.75 project vehicles. No building egress
      penalty (3 stories < 4-story NFPA 101 threshold). Dead-end residential street
      ≤ 20 mph → HCM capacity ~900 vph. ΔT = (447.75 / 900) × 60 ≈ 29.8 min.
      Non-FHSZ threshold: 6.0 min. ΔT far exceeds threshold → DISCRETIONARY.
      PENDING Standard 6 preview: the 19–21 ft road widths independently fail IFC §503
      fire apparatus access minimums. When Standard 6 (agents/scenarios/site_access.py)
      ships, this project will flag under both ΔT and site access criteria simultaneously.
      Case numbers: MULTI-004609-2021, DR-004610-2021, BADJ-004611-2021.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # Sage Canyon Apartments (real project): 120 units, 5 stories, single access from
  #     Sage Canyon Drive → DISCRETIONARY (VHFHSZ + egress penalty compound)
  #     Real project: Wermers Properties, SE corner Sage Canyon Dr & El Camino Real,
  #     New Encinitas. PC approved Dec 18 2025 (4-0). Coastal Commission pending.
  #     GIS lookup at corrected coordinates (33.0260, -117.2548) places this site in the
  #     locally-adopted VHFHSZ (South El Camino Real / Crest Drive zone). See encinitas.yaml.
  #     120 units × 2.5 × 0.90 = 270 project vehicles.
  #     5 stories → egress_penalty = min(5 × 1.5, 12) = 7.5 min (NFPA 101).
  #     VHFHSZ capacity degradation: 0.35 → effective capacity sharply reduced.
  #     VHFHSZ ΔT threshold: 45 min × 5% = 2.25 min.
  #     Engine result: max ΔT ≈ 48.6 min >> 2.25-min threshold → DISCRETIONARY by ~21×.
  #     Height waiver approved for up to 75 ft 2 in (vs 30-ft R-30 limit).
  # -----------------------------------------------------------
  - name: "Sage Canyon Apartments"
    address: "SE corner Sage Canyon Dr & El Camino Real, New Encinitas"
    geocode_address: "3601 Sage Canyon Dr, Encinitas"
    lat: 33.0260
    lon: -117.2548
    units: 120
    stories: 5
    description: >
      Real project — Wermers Properties, 120-unit (96 market rate + 24 deed-restricted)
      5-story apartment building at the SE corner of Sage Canyon Drive and El Camino Real
      in New Encinitas (APN 262-061-85; 5.23 gross acres).
      PC approved December 18, 2025 (4–0). City Council denied developer's appeal on
      El Camino Real road improvements February 25, 2026. California Coastal Commission
      coordination still required; not yet under construction.
      Height waiver approved to 75 ft 2 in (vs 30-ft standard R-30 limit).
      JOSH ΔT analysis: 120 × 2.5 × 0.90 = 270 project vehicles. Building egress
      penalty: 5 stories × 1.5 min/story = 7.5 min (NFPA 101).
      GIS point-in-polygon at corrected coordinates (33.0260, -117.2548) returns
      VHFHSZ — South El Camino Real / Crest Drive zone adopted by Encinitas 2025
      (locally adopted LRA FHSZ; not returned by CAL FIRE SRA API — see city config).
      VHFHSZ capacity degradation factor: 0.35 (HCM + NIST Camp Fire). Effective
      capacity of serving routes sharply reduced. VHFHSZ ΔT threshold: 2.25 min.
      Engine result: max ΔT ≈ 48.6 min >> 2.25-min threshold → DISCRETIONARY by ~21×.
      Note: even without the FHSZ, the 7.5-min egress penalty alone would exceed
      the non-FHSZ 6.0-min threshold — DISCRETIONARY on two independent grounds.
      Single vehicular access from Sage Canyon Drive; El Camino Real frontage at
      ~56 mph prevailing speed (documented pedestrian safety concern in staff reports).
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # Quail Meadows Apartments (real project): 448 units in two 4-story buildings on
  #     a 2-lane road already at capacity → DISCRETIONARY (overwhelming ΔT)
  #     Real project: Baldwin & Sons, 185–225 Quail Gardens Dr, Encinitas.
  #     PC approved Oct 3 2024; City Council upheld 3-1 Feb 12 2025 (explicit duress —
  #     HCD de-certification threat). Three Coastal Commission appeals pending.
  #     448 units × 2.5 × 0.90 = 1008 project vehicles.
  #     4 stories → egress_penalty = 4 × 1.5 = 6.0 min.
  #     Quail Gardens Dr two-lane collector (30 mph → ~1350 vph).
  #     Vehicle ΔT = (1008 / 1350) × 60 ≈ 44.8 min; total ΔT ≈ 50.8 min.
  #     Non-FHSZ threshold = 6.0 min → DISCRETIONARY by wide margin.
  #     Highest unit count in Encinitas demo; also highest ΔT.
  # -----------------------------------------------------------
  - name: "Quail Meadows Apartments"
    address: "185–225 Quail Gardens Drive, Encinitas"
    geocode_address: "185 Quail Gardens Dr, Encinitas"
    lat: 33.0501
    lon: -117.2791
    units: 448
    stories: 4
    description: >
      Real project — Baldwin & Sons (Quail Meadows Properties LLC), 448-unit
      (358 market rate + 90 deed-restricted at 80% AMI) complex in two 4-story buildings
      on a former 11.96-acre greenhouse site at 185–225 Quail Gardens Drive, Encinitas.
      749 parking spaces; two levels of underground parking per building; new roundabout
      condition at Kristen Court / Quail Gardens Drive. 3.31 acres set aside as biological
      open space preserve for coastal California gnatcatcher habitat.
      PC approved ministerially October 3, 2024. City Council upheld 3–1 on February 12,
      2025 under explicit duress (HCD de-certification threat). Three groups have appealed
      to the California Coastal Commission — no hearing date set as of March 2026.
      USFWS Incidental Take Permit application published Federal Register Feb 2, 2026.
      JOSH ΔT analysis: 448 × 2.5 × 0.90 = 1,008 project vehicles. Building egress
      penalty: 4 stories × 1.5 min/story = 6.0 min (NFPA 101, at-threshold stories).
      Quail Gardens Drive is a two-lane collector at ~30 mph → HCM capacity ~1350 vph.
      Vehicle ΔT = (1008 / 1350) × 60 ≈ 44.8 min. Total ΔT ≈ 50.8 min.
      Non-FHSZ threshold: 6.0 min. ΔT exceeds threshold by ~8.5× → DISCRETIONARY.
      Community opposition documented cumulative impact: Quail Gardens Drive already
      serves Fox Point Farms, Sunshine Gardens, and Moonlight Apartments — this
      corridor's aggregate load is a pending multi-project analysis scenario.
      Case numbers: MULTI-003751-2020, DR-003759-2020, CDP-003761-2020.
