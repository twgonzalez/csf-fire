# ============================================================
# Encinitas AB 747 Demo Projects — JOSH v3.2 (ΔT Standard)
# ============================================================
# Use with:  uv run python main.py demo --city "Encinitas"
#
# Purpose: Demonstrate ministerial vs discretionary determination for a mixed
# coastal/inland city with both non-FHSZ and locally-adopted VHFHSZ areas.
#
# FHSZ NOTE: Encinitas is LRA (Local Responsibility Area). The CAL FIRE
# HHZ_ref_FHSZ API returns 0 features (SRA-only endpoint). The city adopted
# CAL FIRE maps in 2025. Locally-adopted zone coverage (approximate):
#   ~18% VHFHSZ — Olivenhain, Saxony Canyon, South El Camino Real / Crest Drive
#   ~9%  High   — transitional inland hillsides
#   ~9%  Moderate — lower canyon edges
#   ~64% Non-FHSZ — coastal strip, downtown, Leucadia, Cardiff
# To use local FHSZ: place config/cities/fhsz/encinitas_fhsz.geojson
# (see config/cities/fhsz/README.md for acquisition instructions).
#
# Tier logic (v3.2 — ΔT Standard, constant mobilization):
#   DISCRETIONARY                        — size >= 15 AND ΔT > threshold on any route
#   MINISTERIAL WITH STANDARD CONDITIONS — size >= 15 AND ΔT within threshold on all routes
#   MINISTERIAL                          — size < 15
#
# Core metric: ΔT = (project_vehicles / bottleneck_effective_capacity) × 60 + egress_penalty
#   project_vehicles = units × 2.5 vpu × 0.90       (NFPA 101 constant mobilization)
#   effective_capacity = hcm_capacity × degradation  (FHSZ zone sets degradation factor)
#   egress_penalty = 0 for < 4 stories; min(stories × 1.5, 12) for ≥ 4 stories
#
# ΔT thresholds by zone:
#   non_fhsz / moderate:  120 min × 5% = 6.00 min
#   high_fhsz:             90 min × 5% = 4.50 min
#   vhfhsz:                45 min × 5% = 2.25 min
#
# Road capacity degradation factors (v3.2, HCM + NIST Camp Fire):
#   non_fhsz:    1.00  (no degradation)
#   moderate:    0.75
#   high_fhsz:   0.50
#   vhfhsz:      0.35
#
# Coverage matrix:
#   Non-FHSZ, below size threshold         → Project 1 (10 units, downtown)
#   Non-FHSZ, size met, good road access   → Project 2 (30 units, Leucadia HWY 101)
#   Non-FHSZ, size met, constrained road   → Project 3 (100 units, inland)
#   Non-FHSZ, size met, egress penalty     → Project 4 (75 units, 5-story transit hub)
#   Non-FHSZ, size met, moderate project   → Project 5 (40 units, Cardiff)
#   Non-FHSZ, single dead-end access       → Project 6 (200 units, Clark Ave)
#   VHFHSZ, Olivenhain canyon, small       → Project 7 (20 units, Olivenhain)
# ============================================================

city: "Encinitas"
state: "CA"
description: "Encinitas AB 747 — Ministerial vs Discretionary Demo (v3.2 ΔT Standard, mixed FHSZ city)"

projects:

  # -----------------------------------------------------------
  # 1 — Downtown small infill: below 15-unit threshold → MINISTERIAL
  #     Non-FHSZ coastal, excellent road access (Highway 101 + El Camino Real).
  #     Standard 1 (size gate) not triggered — no ΔT computation required.
  # -----------------------------------------------------------
  - name: "Downtown Encinitas Small Infill"
    address: "2nd St & D St, Downtown Encinitas"
    lat: 33.0370
    lon: -117.2920
    units: 10
    stories: 2
    description: >
      10-unit, 2-story infill project in downtown Encinitas near Moonlight Beach.
      Non-FHSZ coastal location with direct access to Highway 101 and El Camino Real.
      Standard 1 (size gate) is NOT triggered: 10 < 15 units.
      Returns MINISTERIAL regardless of road conditions or ΔT computation.
      Lowest-risk archetype: small coastal infill with abundant road access.
    expected_tier: "MINISTERIAL"

  # -----------------------------------------------------------
  # 2 — Leucadia HWY 101 small-mid: size met, good access → MINISTERIAL WITH STANDARD CONDITIONS
  #     30 units × 2.5 × 0.90 = 67.5 project vehicles.
  #     HWY 101 is a multilane arterial (≥ 2 lanes, ~1900 vph/lane effective).
  #     ΔT = (67.5 / ~1900) × 60 ≈ 2.1 min — well within 6.0-min threshold.
  # -----------------------------------------------------------
  - name: "Leucadia Highway 101 Infill"
    address: "N Coast Hwy 101 & Leucadia Blvd, Leucadia"
    lat: 33.0730
    lon: -117.3010
    units: 30
    stories: 3
    description: >
      30-unit, 3-story project on the Highway 101 corridor in Leucadia.
      Non-FHSZ. Mobilization rate 0.90 (NFPA 101 constant) → 67.5 project vehicles.
      No egress penalty (3 stories < 4-story threshold). No FHSZ degradation.
      HWY 101 multilane effective capacity: ~1900 vph/lane. ΔT ≈ 2.1 min.
      Non-FHSZ threshold: 120 min × 5% = 6.0 min. ΔT well within threshold.
      Demonstrates that moderate projects on well-served corridors qualify for
      ministerial approval automatically once the size gate is met.
    expected_tier: "MINISTERIAL WITH STANDARD CONDITIONS"

  # -----------------------------------------------------------
  # 3 — Inland constrained access: large project, narrow road → DISCRETIONARY
  #     100 units × 2.5 × 0.90 = 225 project vehicles.
  #     El Fuerte / Rancho Santa Fe area: two-lane collector at 30 mph (~1350 vph).
  #     ΔT = (225 / 1350) × 60 = 10.0 min > 6.0-min threshold → DISCRETIONARY.
  # -----------------------------------------------------------
  - name: "Encinitas Ranch Inland"
    address: "El Fuerte St & Calle Barcelona, Encinitas"
    lat: 33.0480
    lon: -117.2550
    units: 100
    stories: 3
    description: >
      100-unit, 3-story project on an inland two-lane collector in the Encinitas Ranch area.
      Non-FHSZ. Mobilization rate 0.90 (NFPA 101 constant) → 225 project vehicles.
      No egress penalty (3 stories). Serving routes include two-lane collectors
      (~1350 vph at 30 mph per HCM 2022). ΔT = (225 / 1350) × 60 ≈ 10.0 min.
      Non-FHSZ threshold: 6.0 min. ΔT exceeds threshold → DISCRETIONARY.
      Demonstrates that even in non-FHSZ areas, large projects on constrained roads fail.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # 4 — Transit hub egress penalty: 5-story building tips ΔT over threshold → DISCRETIONARY
  #     75 units × 2.5 × 0.90 = 168.75 project vehicles.
  #     5 stories → egress_penalty = 5 × 1.5 = 7.5 min (NFPA 101).
  #     Even on a well-served corridor, egress penalty pushes total ΔT > 6.0 min.
  #     SB 79 transit proximity flag (informational — no tier impact).
  # -----------------------------------------------------------
  - name: "Encinitas Station Transit Hub"
    address: "Encinitas Blvd & El Camino Real"
    lat: 33.0420
    lon: -117.2670
    units: 75
    stories: 5
    description: >
      75-unit, 5-story mixed-use project near Encinitas Blvd / El Camino Real —
      likely within SB 79 transit proximity of the Encinitas NCTD Coaster station
      (informational flag; no tier impact). Non-FHSZ.
      Mobilization rate 0.90 (NFPA 101 constant) → 168.75 project vehicles.
      Building egress penalty: 5 stories × 1.5 min/story = 7.5 min (NFPA 101).
      Vehicle ΔT + 7.5 min egress → total ΔT exceeds 6.0-min threshold → DISCRETIONARY.
      Mitigation: reduce to ≤ 3 stories (eliminates egress penalty) and verify vehicle ΔT.
      Demonstrates that building height — not just road congestion — triggers review.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # 5 — Cardiff mixed-use: size met, moderate size, low-traffic road → MINISTERIAL WITH STANDARD CONDITIONS
  #     40 units × 2.5 × 0.90 = 90 project vehicles.
  #     San Elijo Ave (two-lane collector, 25 mph ≈ 1125 vph).
  #     ΔT = (90 / 1125) × 60 ≈ 4.8 min — within 6.0-min threshold.
  # -----------------------------------------------------------
  - name: "Cardiff Mixed-Use"
    address: "San Elijo Ave & Birmingham Dr, Cardiff-by-the-Sea"
    lat: 33.0130
    lon: -117.2790
    units: 40
    stories: 3
    description: >
      40-unit, 3-story project in Cardiff-by-the-Sea along San Elijo Ave.
      Non-FHSZ. Mobilization rate 0.90 (NFPA 101 constant) → 90 project vehicles.
      No egress penalty (3 stories). San Elijo Ave two-lane collector at 25 mph:
      HCM capacity ≈ 1125 vph. ΔT = (90 / 1125) × 60 ≈ 4.8 min.
      Non-FHSZ threshold: 6.0 min. ΔT within threshold.
      MINISTERIAL WITH STANDARD CONDITIONS. Compare with Encinitas Ranch Inland
      (Project 3, 100 units) which exceeds threshold on a similar road type —
      project scale is the differentiating factor.
    expected_tier: "MINISTERIAL WITH STANDARD CONDITIONS"

  # -----------------------------------------------------------
  # 6 — Clark Ave dead-end: 200 units at end of narrow single-access road → DISCRETIONARY
  #     200 units × 2.5 × 0.90 = 450 project vehicles.
  #     4 stories → egress_penalty = 4 × 1.5 = 6.0 min.
  #     Dead-end coastal bluff road: single bottleneck, no alternate egress.
  #     Non-FHSZ threshold = 6.0 min; ΔT from vehicles alone >> threshold.
  #     NOTE: This also illustrates the PENDING Standard 6 (IFC §503 site access):
  #     a ~18-ft wide dead-end serving 200 units fails fire apparatus access width
  #     (IFC minimum: 20 ft one-way, 26 ft two-way) and turnaround requirements.
  #     Standard 6 is not yet implemented — the ΔT result is determinative here.
  # -----------------------------------------------------------
  - name: "Clark Ave Dead-End"
    address: "Clark Ave, Encinitas coastal bluffs"
    lat: 33.0340
    lon: -117.2940
    units: 200
    stories: 4
    description: >
      200-unit, 4-story project at the end of Clark Ave — a narrow dead-end road on the
      Encinitas coastal bluffs with a single access point. Non-FHSZ.
      Mobilization rate 0.90 (NFPA 101 constant) → 450 project vehicles.
      Building egress penalty: 4 stories × 1.5 min/story = 6.0 min (NFPA 101).
      Single bottleneck, no alternate egress path → ΔT far above 6.0-min threshold.
      DISCRETIONARY under current v3.2 standard (ΔT alone is determinative).
      PENDING Standard 6 preview: the ~18-ft road width also fails IFC §503 fire apparatus
      access minimums (20 ft one-way / 26 ft two-way) and dead-end turnaround requirements.
      When Standard 6 (agents/scenarios/site_access.py) ships, this project will flag
      under both ΔT and site access criteria simultaneously.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # 7 — Olivenhain VHFHSZ: small project, degraded capacity, tight threshold → DISCRETIONARY
  #     VHFHSZ: road capacity degraded to 35% of base (HCM + NIST Camp Fire).
  #     20 units × 2.5 × 0.90 = 45 project vehicles.
  #     Olivenhain Rd two-lane at 35 mph: 1575 vph base × 0.35 = 551 vph effective.
  #     ΔT = (45 / 551) × 60 ≈ 4.9 min >> 2.25-min VHFHSZ threshold → DISCRETIONARY.
  #     Key contrast: the same 20-unit project in non-FHSZ (6.0-min threshold,
  #     undegraded capacity) would be MINISTERIAL WITH STANDARD CONDITIONS.
  #     The VHFHSZ designation is the determinative factor — not project scale.
  # -----------------------------------------------------------
  - name: "Olivenhain Canyon VHFHSZ Infill"
    address: "Olivenhain Rd & Rancho Santa Fe Rd, Olivenhain"
    lat: 33.0155
    lon: -117.2320
    units: 20
    stories: 2
    description: >
      20-unit, 2-story project at the Olivenhain/Rancho Santa Fe intersection —
      within the VHFHSZ area of Encinitas adopted in 2025 (Olivenhain community).
      VHFHSZ road capacity degradation factor: 0.35 (HCM Exhibit 10-15/10-17 +
      NIST Camp Fire validation). No building egress penalty (2 stories < 4-story
      threshold). Mobilization: 0.90 (NFPA 101 constant) → 45 project vehicles.
      Olivenhain Rd two-lane 35 mph: 1575 vph base × 0.35 = 551 vph effective.
      ΔT = (45 / 551) × 60 ≈ 4.9 min. VHFHSZ threshold = 45 min × 5% = 2.25 min.
      ΔT exceeds threshold → DISCRETIONARY.
      Demonstrates the FHSZ dimension: a project qualifying for ministerial approval
      in a non-FHSZ zone triggers discretionary review at identical scale in VHFHSZ.
      Canyon terrain and Santa Ana wind exposure inform the tight 45-min egress window.
    expected_tier: "DISCRETIONARY"
