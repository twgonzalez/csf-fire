  #     VHFHSZ capacity degradation (0.35) sharply reduces effective capacity of
  #     Rancho Santa Fe Rd (primary evacuation corridor for the valley).
  # -----------------------------------------------------------
  - name: "Goodson Project (Encinitas Blvd Apartments)"
    address: "2220–2230 Encinitas Blvd (McCain Lane access), Olivenhain"
    geocode_address: "2220 Encinitas Blvd, Encinitas"
    lat: 33.037726   # geocoded 2026-03-27 — Census geocoder matched "2220 Encinitas Blvd, Encinitas"
    lon: -117.239747
    units: 250   # approved count (Resolution 2022-70); 277-unit proposal was denied 2021
    stories: 5   # 69-ft height via density bonus waiver; 6-story massing denied, approved at ~5 stories
    description: >
      Real project — Greystar 2220 Encinitas Development, LLC, 250-unit (200 market-rate
      + 50 affordable: 21 very-low-income, 29 low-income) apartment complex on a ~7-acre
      site at 2220–2230 Encinitas Boulevard in the Olivenhain community, Encinitas.
      Primary vehicular access via McCain Lane, a private road off Encinitas Boulevard.
      Wrap design: residential units surround a central structured parking garage.
      Building height: 69 feet approved via density bonus waiver (General Plan limit: 39 ft).
      Project history: a 283-unit density bonus proposal was submitted in 2020; revised to
      277 units in 2021 (denied by Planning Commission and City Council on appeal); revised
      again to 250 units and approved by City Council via Resolution No. 2022-70. Under
      construction as of 2026. Litigation: Encinitas Advocates for Responsible Development
      filed suit in March 2022 challenging the approval; outcome pending.
      Fire safety record: an independent fire study entered into the public record found
      that evacuation of Olivenhain (~6,000 residents) via Rancho Santa Fe Road — a
      two-lane rural arterial — would take approximately 11 hours, while a Santa Ana
      wind-driven wildfire could burn through the valley in approximately 1 hour.
      JOSH ΔT analysis: 250 × 2.5 × 0.90 = 562.5 project vehicles. Building egress
      penalty: 5 stories × 1.5 min/story = 7.5 min (NFPA 101). GIS point-in-polygon
      at this location returns VHFHSZ (Olivenhain zone, locally adopted by Encinitas 2025;
      not returned by CAL FIRE SRA API — see city config). VHFHSZ capacity degradation
      factor: 0.35 (HCM + NIST Camp Fire). Rancho Santa Fe Road effective capacity
      sharply reduced. VHFHSZ ΔT threshold: 2.25 min. Combined vehicle ΔT + 7.5-min
      egress penalty far exceeds threshold → DISCRETIONARY. Note: even the 7.5-min
      egress penalty alone exceeds both the VHFHSZ threshold (2.25 min) and the
      non-FHSZ threshold (6.0 min) — DISCRETIONARY on independent grounds.
      The community-documented evacuation study (11-hour evacuation window vs. 1-hour
      fire risk) directly validates the VHFHSZ ΔT framework's conservative approach.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # El Camino Real Corridor — Maximum Ministerial (hypothetical):
  #     Demonstrates the unit ceiling for MINISTERIAL WITH STANDARD CONDITIONS
  #     on the El Camino Real corridor (non-FHSZ project site).
  #
  #     Binding bottleneck: Manchester Avenue (VHFHSZ zone, multilane 45 mph).
  #       HCM cap: 1,900 vph (multilane highway) × 0.35 VHFHSZ degradation = 665 vph effective.
  #     Secondary bottleneck: Beechtree Drive (non_fhsz, two-lane 25 mph, 1,125 vph effective).
  #
  #     Tipping point formula (non-FHSZ site, 1–3 stories, no egress penalty):
  #       max_units = floor(threshold × bottleneck_cap / (60 × vpu × mob_rate))
  #                 = floor(6.00 × 665 / (60 × 2.5 × 0.90))
  #                 = floor(3,990 / 135) = 29 units
  #
  #     At 29 units: project_vehicles = 29 × 2.5 × 0.90 = 65.25 vph
  #       Manchester ΔT = (65.25 / 665) × 60 = 5.89 min ≤ 6.00 min ✓
  #       Beechtree ΔT  = (65.25 / 1125) × 60 = 3.48 min ≤ 6.00 min ✓
  #
  #     At 30 units: project_vehicles = 67.5 vph
  #       Manchester ΔT = (67.5 / 665) × 60 = 6.09 min > 6.00 min → DISCRETIONARY
  #
  #     Key insight: The binding constraint is NOT the local El Camino Real infrastructure
  #     (which is non-FHSZ and carries high HCM capacity). It is Manchester Avenue — a
  #     VHFHSZ multilane arterial that evacuation paths must traverse. The 0.35 VHFHSZ
  #     capacity degradation collapses its effective capacity from 1,900 → 665 vph,
  #     creating the bottleneck from ~0.5 miles away in a different fire zone.
  #
  #     Stories constraint: 4+ stories raises egress_penalty ≥ 6.0 min, which alone
  #     equals the non-FHSZ threshold. Any project ≥ 4 stories AND ≥ 15 units on this
  #     corridor is DISCRETIONARY regardless of unit count.
  #
  #     Coordinates analysis-validated 2026-03-16: evaluate run at 33.0455, -117.2628
  #     confirmed El Camino Real serving routes (North El Camino Real + South El Camino Real
  #     both appear in Step 3 route list). Site is non-FHSZ.
  # -----------------------------------------------------------
  - name: "El Camino Real Corridor — Maximum Ministerial"
    address: "El Camino Real at Encinitas Blvd, Encinitas (hypothetical)"
    geocode_address: "101 N El Camino Real, Encinitas"
    lat: 33.0455   # analysis-validated 2026-03-16 — evaluate run confirmed El Camino Real serving routes
    lon: -117.2628
    units: 29      # maximum for MINISTERIAL WITH STANDARD CONDITIONS — 30 units flips to DISCRETIONARY
    stories: 3     # must stay < 4 stories; egress_penalty at 4 stories = 6.0 min = full threshold
    description: >
      Hypothetical project demonstrating the maximum unit count for MINISTERIAL WITH
      STANDARD CONDITIONS on the El Camino Real corridor in non-FHSZ Encinitas.
      The binding bottleneck is Manchester Avenue — a multilane arterial (45 mph, 1,900 vph
      HCM) that passes through VHFHSZ territory. The 0.35 VHFHSZ capacity degradation
      reduces its effective capacity to 665 vph, setting the unit ceiling despite the
      project site itself being non-FHSZ.
      JOSH ΔT analysis: 29 × 2.5 × 0.90 = 65.25 project vehicles.
      No egress penalty (3 stories < 4-story NFPA 101 threshold).
      Manchester Avenue bottleneck: ΔT = (65.25 / 665) × 60 = 5.89 min ≤ 6.00 min threshold.
      Beechtree Drive bottleneck: ΔT = (65.25 / 1125) × 60 = 3.48 min ≤ 6.00 min threshold.
      Adding one more unit (30 units → 67.5 vph) pushes Manchester ΔT to 6.09 min → DISCRETIONARY.
      Stories constraint: 4+ stories triggers egress_penalty ≥ 6.0 min (NFPA 101), which alone
      equals the non-FHSZ 6.00 min threshold — making any 4-story project on this corridor
      DISCRETIONARY regardless of unit count.
      This example illustrates how a VHFHSZ bottleneck on a downstream evacuation route
      can constrain development capacity at non-FHSZ sites ~0.5 miles away.
    expected_tier: "MINISTERIAL WITH STANDARD CONDITIONS"
