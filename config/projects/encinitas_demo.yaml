  # -----------------------------------------------------------
  # Goodson Project / Encinitas Blvd Apartments (real project): 250 units,
  #     ~5 stories, wrap design, primary access via McCain Lane off Encinitas Blvd,
  #     Olivenhain community → DISCRETIONARY (VHFHSZ + egress penalty compound)
  #     Real project: Greystar 2220 Encinitas Development, LLC.
  #     History: 283-unit proposal (2020); revised to 277-unit density bonus proposal
  #     (2021, denied by PC and CC); revised to 250 units (200 market-rate + 50
  #     affordable: 21 very-low-income + 29 low-income). Approved via Resolution
  #     No. 2022-70. Under construction as of 2026.
  #     Site: ~7 acres near Encinitas Blvd & Rancho Santa Fe Rd, Olivenhain.
  #     Height: 69 ft via density bonus waiver (vs. 39-ft General Plan limit).
  #     Independent fire study entered into record: evacuation of Olivenhain
  #     (~6,000 residents) via Rancho Santa Fe Rd (two-lane) takes ~11 hours;
