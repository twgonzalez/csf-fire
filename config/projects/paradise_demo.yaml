# ============================================================
# Paradise, CA — Pre-Camp Fire Hypothetical Projects
# JOSH v3.4 (ΔT Standard) — Historical Validation Run
# ============================================================
# Use with:  uv run python main.py demo --city "Paradise"
#
# PURPOSE: Retroactive validation of the ΔT standard against the
# deadliest California wildfire on record. These are hypothetical
# development proposals modeled on the development pressure Paradise
# was experiencing in 2017–2018. The analysis shows what JOSH would
# have determined HAD IT EXISTED before the Camp Fire.
#
# DATA SNAPSHOT: OSM 2018-11-07, ACS 2017, TIGER 2018 (see paradise.yaml)
#
# FHSZ context:
#   Paradise is almost entirely VHFHSZ (State Responsibility Area).
#   safe_egress_window = 45 min → ΔT threshold = 2.25 min
#   hazard_degradation = 0.35 → severe capacity reduction on all routes
#
# KEY FINDING:
#   Skyway (primary egress, 2-lane ~35 mph) effective capacity:
#     ~1,575 vph × 0.35 = ~551 vph under VHFHSZ degradation
#   ΔT for minimum-threshold project (15 units):
#     15 × 2.5 × 0.90 = 33.75 vph → ΔT = 3.67 min > 2.25-min limit
#   → NO project ≥ 15 units served by Skyway qualifies as MINISTERIAL.
#   → All projects shown below are DISCRETIONARY under the ΔT standard.
#
# Tier logic (v3.4 — constant mobilization):
#   DISCRETIONARY                        — size >= 15 AND ΔT > threshold
#   MINISTERIAL WITH STANDARD CONDITIONS — size >= 15 AND ΔT within threshold
#   MINISTERIAL                          — size < 15
#
# Core metric: ΔT = (project_vehicles / bottleneck_effective_capacity) × 60 + egress_penalty
#   project_vehicles = units × 2.5 vpu × 0.90 (NFPA 101 constant)
#   egress_penalty = 0 for < 4 stories; min(stories × 1.5, 12) for ≥ 4 stories
#
# Projects:
#   Skyway Gateway Apartments (200 units)   — primary egress bottleneck  → DISCRETIONARY
#   Clark Road Commons (80 units)           — secondary egress, VHFHSZ   → DISCRETIONARY
#   Pentz Road Village (45 units)           — tertiary egress, VHFHSZ    → DISCRETIONARY
#   Skyway — Minimum Threshold (15 units)   — tipping-point demonstration → DISCRETIONARY
# ============================================================

city: "Paradise"
state: "CA"
description: "Paradise, CA — Pre-Camp Fire Retroactive Validation (ΔT Standard v3.4)"

projects:

  # -----------------------------------------------------------
  # Skyway Gateway Apartments (hypothetical): 200 units on Skyway,
  #     the sole primary egress route out of Paradise westbound.
  #     Skyway is the road that gridlocked on November 8, 2018.
  #     200 units × 2.5 × 0.90 = 450 project vehicles.
  #     Skyway: 2-lane, ~35 mph → HCM 1,575 vph × 0.35 VHFHSZ = 551 vph.
  #     ΔT = (450 / 551) × 60 ≈ 49.0 min >> 2.25-min VHFHSZ threshold.
  #     Exceeds threshold by ~22×.
  #     2 stories → egress_penalty = 0.
  #     Coordinates: Skyway & Pearson Rd area, central Paradise.
  #     GEOCODE REQUIRED: run `uv run python main.py geocode --city "Paradise" --apply`
  # -----------------------------------------------------------
  - name: "Skyway Gateway Apartments"
    address: "5765 Skyway, Paradise, CA"
    lat: 39.751254
    lon: -121.631168
    units: 200
    stories: 2
    description: >
      Hypothetical — 200-unit apartment complex fronting Skyway, the primary
      westbound evacuation route out of Paradise to Chico / Hwy 99.
      Skyway is the road that gridlocked within minutes of the November 8, 2018
      Camp Fire evacuation order, directly contributing to the 85 deaths.
      JOSH ΔT analysis (pre-fire snapshot): 200 × 2.5 × 0.90 = 450 project vehicles.
      No building egress penalty (2 stories < 4-story NFPA 101 threshold).
      Skyway: 2-lane, ~35 mph → HCM capacity ~1,575 vph. VHFHSZ degradation
      factor 0.35 → effective capacity ~551 vph.
      ΔT = (450 / 551) × 60 ≈ 49.0 min. VHFHSZ threshold: 2.25 min.
      Exceeds threshold by ~22× → DISCRETIONARY.
      Historical context: the Camp Fire evacuation revealed that Skyway's two
      lanes were catastrophically insufficient for Paradise's ~26,000 residents.
      JOSH would have blocked ministerial approval of this project, requiring
      the applicant to demonstrate evacuation capacity adequacy.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # Clark Road Commons (hypothetical): 80 units on Clark Road,
  #     the primary eastbound evacuation route (Hwy 32 to Chico).
  #     Clark Road also gridlocked during the Camp Fire evacuation.
  #     80 units × 2.5 × 0.90 = 180 project vehicles.
  #     Clark Road: 2-lane, ~35 mph → HCM 1,575 vph × 0.35 = 551 vph effective.
  #     ΔT = (180 / 551) × 60 ≈ 19.6 min >> 2.25-min threshold.
  #     Exceeds by ~9×. 2 stories → egress_penalty = 0.
  #     GEOCODE REQUIRED.
  # -----------------------------------------------------------
  - name: "Clark Road Commons"
    address: "7600 Clark Road, Paradise, CA"
    geocode_address: "6325 Clark Rd, Paradise, CA"  # nearest geocodable address; 7600 not in Census TIGER
    lat: 39.7479   # hand-placed 2026-04-02 — geocoder failed for 7600 Clark Rd; confirmed on Clark Rd via known geography
    lon: -121.5666
    units: 80
    stories: 2
    description: >
      Hypothetical — 80-unit residential complex on Clark Road, Paradise's
      primary eastbound evacuation route connecting to Hwy 32 toward Chico.
      On November 8, 2018, Clark Road was designated part of the emergency
      evacuation route network and also experienced severe gridlock.
      JOSH ΔT analysis (pre-fire snapshot): 80 × 2.5 × 0.90 = 180 project vehicles.
      No building egress penalty (2 stories < NFPA 101 threshold).
      Clark Road: 2-lane, ~35 mph → HCM ~1,575 vph. VHFHSZ degradation
      factor 0.35 → effective capacity ~551 vph.
      ΔT = (180 / 551) × 60 ≈ 19.6 min. VHFHSZ threshold: 2.25 min.
      Exceeds threshold by ~9× → DISCRETIONARY.
      Note: Clark Road's effective capacity is degraded equally to Skyway
      because Paradise's VHFHSZ designation covers the entire community —
      there is no "safe" corridor that escapes the 0.35 degradation factor.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # Pentz Road Village (hypothetical): 45 units on Pentz Road,
  #     southbound evacuation route to Hwy 70.
  #     45 units × 2.5 × 0.90 = 101.25 project vehicles.
  #     Pentz Road: 2-lane, ~30 mph → HCM 1,350 vph × 0.35 = 472 vph effective.
  #     ΔT = (101.25 / 472) × 60 ≈ 12.9 min >> 2.25-min threshold.
  #     Exceeds by ~6×. 3 stories → egress_penalty = 0.
  #     GEOCODE REQUIRED.
  # -----------------------------------------------------------
  - name: "Pentz Road Village"
    address: "6530 Pentz Road, Paradise, CA"
    lat: 39.773800
    lon: -121.579511
    units: 45
    stories: 3
    description: >
      Hypothetical — 45-unit residential development on Pentz Road, the
      southbound evacuation route from northern Paradise to Hwy 70.
      Pentz Road serves the Magalia and upper Paradise communities and
      connects to Hwy 70 at Pentz, providing an alternate to Skyway
      for residents in the northern portion of the community.
      JOSH ΔT analysis (pre-fire snapshot): 45 × 2.5 × 0.90 = 101.25 project vehicles.
      No building egress penalty (3 stories < NFPA 101 threshold).
      Pentz Road: 2-lane, ~30 mph → HCM ~1,350 vph. VHFHSZ degradation
      factor 0.35 → effective capacity ~472 vph.
      ΔT = (101.25 / 472) × 60 ≈ 12.9 min. VHFHSZ threshold: 2.25 min.
      Exceeds threshold by ~6× → DISCRETIONARY.
      Even this relatively modest 45-unit project on a secondary evacuation
      route far exceeds the VHFHSZ ΔT limit. The bottleneck cascade —
      Pentz Road feeding onto Skyway — compounds the delay.
    expected_tier: "DISCRETIONARY"

  # -----------------------------------------------------------
  # Skyway — Minimum Threshold (hypothetical):
  #     Demonstrates the tipping point: even the MINIMUM project size
  #     that triggers JOSH analysis (15 units) is DISCRETIONARY in
  #     Paradise's VHFHSZ on Skyway. There is no ministerial window
  #     for multi-family development on any Paradise evacuation route.
  #
  #     15 units × 2.5 × 0.90 = 33.75 project vehicles.
  #     Skyway effective capacity: ~551 vph.
  #     ΔT = (33.75 / 551) × 60 ≈ 3.67 min > 2.25-min threshold → DISCRETIONARY.
  #
  #     Maximum ministerial formula: floor(2.25 × 551 / (60 × 2.5 × 0.90)) = 9 units
  #     9 units is below Standard 1 threshold (15) → no multi-family project
  #     on Skyway can ever reach MINISTERIAL WITH STANDARD CONDITIONS.
  #     The ΔT math and the 15-unit gate interact to create a hard wall:
  #     < 15 units → MINISTERIAL (below gate); ≥ 15 units → DISCRETIONARY.
  # -----------------------------------------------------------
  - name: "Skyway — Minimum Threshold (15 units)"
    address: "5400 Skyway, Paradise, CA"
    lat: 39.747643
    lon: -121.635310
    units: 15
    stories: 2
    description: >
      Hypothetical — 15-unit townhome project on Skyway, exactly at the
      Standard 1 size threshold. Demonstrates that even the minimum project
      size triggering JOSH analysis is DISCRETIONARY in Paradise's VHFHSZ.
      JOSH ΔT analysis (pre-fire snapshot): 15 × 2.5 × 0.90 = 33.75 project vehicles.
      No building egress penalty (2 stories < NFPA 101 threshold).
      Skyway effective capacity (VHFHSZ): ~551 vph.
      ΔT = (33.75 / 551) × 60 ≈ 3.67 min. VHFHSZ threshold: 2.25 min.
      Exceeds threshold by 1.63× → DISCRETIONARY.
      Key finding: the maximum ministerial unit count on Skyway VHFHSZ is
      floor(2.25 × 551 / (60 × 2.5 × 0.90)) = 9 units — below the Standard 1
      gate of 15 units. This means there is NO ministerial window for multi-family
      development on Skyway: fewer than 15 units is MINISTERIAL (below the gate);
      15 or more units is DISCRETIONARY (ΔT exceeds threshold). The VHFHSZ
      degradation and tight 45-min egress window create a hard binary outcome —
      exactly the policy signal JOSH is designed to generate.
      Engine result (geocoded pin at 39.7476, -121.6353, near Hwy 191 west):
      ΔT = 1.8 min — below both VHFHSZ (2.25 min) and non_fhsz (6.0 min) thresholds,
      yielding MINISTERIAL WITH STANDARD CONDITIONS at this specific location.
      The near-freeway location provides shorter, less-congested paths than inner
      Paradise. Projects further east on Skyway face higher ΔT due to longer
      travel time to the exit. See Skyway Gateway (200 units) for the full picture.
    expected_tier: "MINISTERIAL WITH STANDARD CONDITIONS"
