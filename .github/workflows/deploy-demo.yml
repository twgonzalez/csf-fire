name: Deploy JOSH Berkeley Demo

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from any branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Berkeley demo
        run: |
          uv run python build.py analyze --city "Berkeley" --data-dir data/berkeley
          uv run python build.py demo --city "Berkeley" \
            --data-dir data/berkeley \
            --projects config/projects/berkeley_demo.yaml

      - name: Run brief renderer tests
        run: node --test tests/test_brief_renderer.js

      - name: Run project manager tests
        run: node --test tests/test_project_manager.js

      - name: Run whatif engine anti-divergence tests
        run: node --test tests/test_whatif_engine.js

      - name: Generate index page
        run: uv run python ci/make_index.py

      - name: Copy root landing page and viewer
        run: |
          cp pages/index.html output/index.html
          cp pages/viewer.html output/viewer.html
          cp pages/mayors_presentation.html output/mayors_presentation.html
          cp -r static output/static

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
