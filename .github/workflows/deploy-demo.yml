name: Deploy JOSH Berkeley Demo

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from any branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Generate Berkeley demo
        run: uv run python main.py demo --city "Berkeley"

      - name: Generate index page
        run: uv run python ci/make_index.py

      - name: Copy root landing page and viewer
        run: |
          cp pages/index.html output/index.html
          cp pages/viewer.html output/viewer.html
          cp pages/mayors_presentation.html output/mayors_presentation.html
          cp -r docs output/docs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
